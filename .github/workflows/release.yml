name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.0.0"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  release:
    name: Build and package CardProof
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set release version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) {
            $version = "${{ github.ref_name }}"
          }
          if (-not $version.StartsWith("v")) {
            $version = "v$version"
          }
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Check server syntax
        shell: pwsh
        run: node --check server.js

      - name: Install desktop build tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt
          choco install innosetup --no-progress -y

      - name: Build desktop executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean .\CardProof.spec
          Copy-Item -Force .\app_config.example.json .\dist\app_config.example.json

      - name: Build source archive
        shell: pwsh
        run: |
          $stage = Join-Path $env:RUNNER_TEMP "CardProof"
          $archive = Join-Path $env:RUNNER_TEMP "CardProof-Source-$env:RELEASE_VERSION.zip"

          if (Test-Path $stage) {
            Remove-Item -LiteralPath $stage -Recurse -Force
          }
          New-Item -ItemType Directory -Path $stage | Out-Null

          $items = @(
            ".gitignore",
            "README.md",
            "README.bilingual.md",
            "app_config.example.json",
            "CardProof.spec",
            "desktop_app.py",
            "desktop_app_impl.pyc",
            "installer",
            "package.json",
            "requirements-desktop.txt",
            "run_desktop.bat",
            "server.js",
            "start.bat",
            "start.local.example.ps1",
            "start.ps1",
            "stop.bat",
            "stop.ps1",
            "public"
          )

          foreach ($item in $items) {
            Copy-Item -LiteralPath $item -Destination $stage -Recurse -Force
          }

          Compress-Archive -Path (Join-Path $stage "*") -DestinationPath $archive -Force
          "SOURCE_ARCHIVE_PATH=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build portable executable archive
        shell: pwsh
        run: |
          $portable = Join-Path $env:RUNNER_TEMP "CardProof-Portable-$env:RELEASE_VERSION.zip"
          Compress-Archive -Path ".\dist\CardProof.exe", ".\dist\app_config.example.json" -DestinationPath $portable -Force
          "PORTABLE_ARCHIVE_PATH=$portable" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows installer
        shell: pwsh
        run: |
          $appVersion = $env:RELEASE_VERSION.TrimStart("v")
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DAppVersion=$appVersion" "/DSourceDir=$pwd\dist" "/DRepoDir=$pwd" ".\installer\CardProof.iss"
          $installer = Join-Path $pwd "dist\CardProof-Setup-v$appVersion.exe"
          "INSTALLER_PATH=$installer" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: CardProof ${{ env.RELEASE_VERSION }}
          files: |
            ${{ env.SOURCE_ARCHIVE_PATH }}
            ${{ env.PORTABLE_ARCHIVE_PATH }}
            ${{ env.INSTALLER_PATH }}
          body: |
            CardProof Windows release.

            - `CardProof-Setup-*.exe` is the Windows installer.
            - `CardProof-Portable-*.zip` contains the standalone executable.
            - `CardProof-Source-*.zip` contains the buildable source package.
            - Excludes local secrets, cache files, build output, and customer files.
